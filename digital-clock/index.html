<!DOCTYPE html>\n<html lang=\"pt-BR\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Relógio Digital - Múltiplos Fusos Horários</title>\n    <link rel=\"stylesheet\" href=\"styles.css\">\n</head>\n<body>\n    <div class=\"container\">\n        <div class=\"header\">\n            <h1>🕐 Relógio Digital</h1>\n            <p class=\"subtitle\">Hora em Diferentes Fusos Horários</p>\n        </div>\n\n        <div class=\"controls\">\n            <button id=\"addClockBtn\" class=\"btn btn-primary\">+ Adicionar Relógio</button>\n            <button id=\"resetBtn\" class=\"btn btn-secondary\">↻ Resetar</button>\n        </div>\n\n        <div class=\"clocks-grid\" id=\"clocksGrid\">\n            <!-- Relógios serão adicionados dinamicamente -->\n        </div>\n    </div>\n\n    <div id=\"timezoneModal\" class=\"modal hidden\">\n        <div class=\"modal-content\">\n            <div class=\"modal-header\">\n                <h2>Selecione um Fuso Horário</h2>\n                <button class=\"close-btn\">&times;</button>\n            </div>\n            <div class=\"modal-body\">\n                <input type=\"text\" id=\"timezoneSearch\" class=\"search-input\" placeholder=\"Buscar fuso horário...\">\n                <div class=\"timezone-list\" id=\"timezoneList\">\n                    <!-- Lista de fusos horários será adicionada aqui -->\n                </div>\n            </div>\n        </div>\n    </div>\n\n    <script src=\"script.js\"></script>\n</body>\n</html>
