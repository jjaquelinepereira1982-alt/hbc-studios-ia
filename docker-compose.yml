version: '3.8'\n\nservices:\n  mongodb:\n    image: mongo:latest\n    container_name: hbc-mongodb\n    ports:\n      - \"27017:27017\"\n    environment:\n      MONGO_INITDB_ROOT_USERNAME: admin\n      MONGO_INITDB_ROOT_PASSWORD: password\n    volumes:\n      - mongodb_data:/data/db\n\n  api:\n    build: .\n    container_name: hbc-api\n    ports:\n      - \"3000:3000\"\n    environment:\n      NODE_ENV: development\n      MONGODB_URI: mongodb://admin:password@mongodb:27017/hbc-studios\n    depends_on:\n      - mongodb\n    volumes:\n      - .:/app\n\nvolumes:\n  mongodb_data: